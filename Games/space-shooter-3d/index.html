<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Shooter 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
    canvas { display: block; }

    #hud {
      position: fixed;
      top: 20px;
      left: 0;
      width: 100%;
      pointer-events: none;
      padding: 0 30px;
      display: flex;
      justify-content: space-between;
      color: #fff;
      font-size: 24px;
      text-shadow: 0 0 15px rgba(0,200,255,.6);
    }
    #score { color: #ffcc00; text-shadow: 0 0 20px rgba(255,200,0,.6); }
    #lives { color: #ff4466; text-shadow: 0 0 20px rgba(255,50,100,.6); }

    #controls-hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.25);
      font-size: 14px;
      pointer-events: none;
    }

    #game-over {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,.75);
      color: #fff;
      pointer-events: none;
    }
    #game-over h1 { font-size: 72px; margin-bottom: 10px; color: #ff4466; text-shadow: 0 0 40px rgba(255,50,100,.8); }
    #game-over p { font-size: 28px; }
    #game-over .restart-hint { font-size: 16px; margin-top: 30px; color: rgba(255,255,255,.4); }
  </style>
</head>
<body>
  <div id="hud">
    <span id="score">Score: 0</span>
    <span id="lives">Lives: 3</span>
  </div>
  <div id="controls-hint">WASD / Arrow Keys – Move &nbsp;|&nbsp; Click – Shoot</div>
  <div id="game-over">
    <h1>Game Over</h1>
    <p id="final-score">Score: 0</p>
    <p class="restart-hint">Press R or refresh to restart</p>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // --- Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    scene.fog = new THREE.Fog(0x050510, 70, 140);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 6, 14);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.prepend(renderer.domElement);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Lights ---
    const ambient = new THREE.AmbientLight(0x222244, 0.6);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
    dirLight.position.set(10, 20, 15);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const colorLight1 = new THREE.PointLight(0x4488ff, 0.5, 30);
    colorLight1.position.set(-8, 5, 5);
    scene.add(colorLight1);

    const colorLight2 = new THREE.PointLight(0xff4488, 0.5, 30);
    colorLight2.position.set(8, -5, 5);
    scene.add(colorLight2);

    // --- Colorful Nebula Background ---
    const nebulaParticles = 4000;
    const nebulaGeo = new THREE.BufferGeometry();
    const nebulaPos = new Float32Array(nebulaParticles * 3);
    const nebulaCol = new Float32Array(nebulaParticles * 3);
    const nebulaSizes = new Float32Array(nebulaParticles);

    for (let i = 0; i < nebulaParticles; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 50 + Math.random() * 80;
      nebulaPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
      nebulaPos[i*3+1] = (Math.random() - 0.5) * 60;
      nebulaPos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);

      const hue = Math.random();
      const c = new THREE.Color().setHSL(hue, 0.7, 0.3 + Math.random() * 0.3);
      nebulaCol[i*3] = c.r;
      nebulaCol[i*3+1] = c.g;
      nebulaCol[i*3+2] = c.b;
      nebulaSizes[i] = 0.3 + Math.random() * 0.8;
    }
    nebulaGeo.setAttribute('position', new THREE.BufferAttribute(nebulaPos, 3));
    nebulaGeo.setAttribute('color', new THREE.BufferAttribute(nebulaCol, 3));
    nebulaGeo.setAttribute('size', new THREE.BufferAttribute(nebulaSizes, 1));

    const nebulaMat = new THREE.PointsMaterial({
      size: 0.5,
      vertexColors: true,
      transparent: true,
      opacity: 0.6,
      sizeAttenuation: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const nebula = new THREE.Points(nebulaGeo, nebulaMat);
    scene.add(nebula);

    // Foreground stars
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(2000 * 3);
    for (let i = 0; i < 2000 * 3; i++) starPos[i] = (Math.random() - 0.5) * 300;
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, transparent: true, opacity: 0.8 });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // --- Player Ship ---
    const ship = new THREE.Group();

    // Main body
    const bodyMat = new THREE.MeshStandardMaterial({
      color: 0x33aaff,
      metalness: 0.7,
      roughness: 0.2,
      emissive: 0x1144aa,
      emissiveIntensity: 0.2
    });
    const bodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.8, 8);
    bodyGeo.rotateX(Math.PI / 2);
    const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
    bodyMesh.castShadow = true;
    ship.add(bodyMesh);

    // Nose
    const noseMat = new THREE.MeshStandardMaterial({
      color: 0x55ccff,
      metalness: 0.6,
      roughness: 0.1,
      emissive: 0x0066ff,
      emissiveIntensity: 0.3
    });
    const noseGeo = new THREE.ConeGeometry(0.4, 0.7, 8);
    noseGeo.rotateX(Math.PI / 2);
    const noseMesh = new THREE.Mesh(noseGeo, noseMat);
    noseMesh.position.x = 1.2;
    ship.add(noseMesh);

    // Wings (colorful)
    const wingMat = new THREE.MeshStandardMaterial({
      color: 0xff44aa,
      metalness: 0.4,
      roughness: 0.3,
      emissive: 0xff2288,
      emissiveIntensity: 0.1
    });
    const wingGeo = new THREE.BoxGeometry(0.7, 0.06, 0.5);
    const wingL = new THREE.Mesh(wingGeo, wingMat);
    wingL.position.set(0.2, -0.5, 0);
    ship.add(wingL);
    const wingR = wingL.clone();
    wingR.position.set(0.2, 0.5, 0);
    ship.add(wingR);

    // Wing tips glow
    const tipMat = new THREE.MeshBasicMaterial({ color: 0xff44aa, transparent: true, opacity: 0.5 });
    const tipGeo = new THREE.SphereGeometry(0.12, 6, 6);
    const tipL = new THREE.Mesh(tipGeo, tipMat);
    tipL.position.set(0.6, -0.5, 0);
    ship.add(tipL);
    const tipR = tipL.clone();
    tipR.position.set(0.6, 0.5, 0);
    ship.add(tipR);

    // Cockpit
    const cockpitMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.7 });
    const cockpitGeo = new THREE.SphereGeometry(0.15, 8, 8);
    const cockpit = new THREE.Mesh(cockpitGeo, cockpitMat);
    cockpit.position.set(0.7, 0, 0.2);
    ship.add(cockpit);

    // Engine glow
    const engineMat = new THREE.MeshBasicMaterial({
      color: 0xff6600,
      transparent: true,
      opacity: 0.7
    });
    const engineGeo = new THREE.CircleGeometry(0.25, 8);
    const engine = new THREE.Mesh(engineGeo, engineMat);
    engine.rotation.y = Math.PI / 2;
    engine.position.x = -1.0;
    ship.add(engine);

    // Engine trail particles
    const trailMat = new THREE.MeshBasicMaterial({
      color: 0xff8800,
      transparent: true,
      opacity: 0.4
    });
    const trailGeo = new THREE.SphereGeometry(0.06, 4, 4);
    const trailL = new THREE.Mesh(trailGeo, trailMat);
    trailL.position.set(-1.2, -0.2, 0);
    ship.add(trailL);
    const trailR = trailL.clone();
    trailR.position.set(-1.2, 0.2, 0);
    ship.add(trailR);

    scene.add(ship);
    ship.position.set(0, 0, 0);

    // --- Game State ---
    const state = {
      score: 0,
      lives: 3,
      speed: 8,
      bounds: { x: 10, y: 6 },
      gameOver: false,
      keys: {
        w: false, a: false, s: false, d: false,
        ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false
      },
      fireCooldown: 0,
      fireRate: 0.12,
      asteroidTimer: 0,
      asteroidInterval: 1.0,
      bullets: [],
      asteroids: [],
      particles: []
    };

    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const gameOverEl = document.getElementById('game-over');
    const finalScoreEl = document.getElementById('final-score');

    // --- Controls ---
    document.addEventListener('keydown', e => {
      if (e.key.startsWith('Arrow')) e.preventDefault();
      if (e.key.toLowerCase() === 'r' && state.gameOver) restartGame();
      if (e.key in state.keys) state.keys[e.key] = true;
    });
    document.addEventListener('keyup', e => {
      if (e.key in state.keys) state.keys[e.key] = false;
    });

    document.addEventListener('mousedown', () => {
      if (state.gameOver) return;
      fireBullet();
    });

    // --- Fire Bullet ---
    function fireBullet() {
      if (state.fireCooldown > 0) return;
      state.fireCooldown = state.fireRate;

      const colors = [0x00ff88, 0x44ff44, 0x88ff00, 0x00ffff, 0x4488ff, 0xff44ff];
      const color = colors[Math.floor(Math.random() * colors.length)];

      const bullet = new THREE.Mesh(
        new THREE.SphereGeometry(0.1, 6, 6),
        new THREE.MeshBasicMaterial({ color })
      );
      const worldPos = new THREE.Vector3();
      ship.getWorldPosition(worldPos);
      bullet.position.copy(worldPos);
      bullet.position.x += 1.5;

      // Bullet glow
      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 6, 6),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.4 })
      );
      bullet.add(glow);

      bullet.userData.vel = new THREE.Vector3(28, (Math.random() - 0.5) * 2, (Math.random() - 0.5) * 1.5);
      bullet.userData.color = color;
      bullet.userData.trail = [];
      scene.add(bullet);
      state.bullets.push(bullet);
    }

    // --- Spawn Asteroid ---
    function spawnAsteroid() {
      const size = 0.4 + Math.random() * 0.7;
      const detail = Math.floor(1 + Math.random() * 2);
      const geo = new THREE.IcosahedronGeometry(size, detail);
      const pos = geo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
        const r = 1 + (Math.random() - 0.5) * 0.4;
        pos.setXYZ(i, x * r, y * r, z * r);
      }
      pos.needsUpdate = true;
      geo.computeVertexNormals();

      // Random bright color
      const hue = Math.random();
      const color = new THREE.Color().setHSL(hue, 0.8, 0.4 + Math.random() * 0.3);
      const mat = new THREE.MeshStandardMaterial({
        color,
        metalness: 0.3,
        roughness: 0.5,
        emissive: color,
        emissiveIntensity: 0.15
      });
      const asteroid = new THREE.Mesh(geo, mat);
      asteroid.castShadow = true;

      // Spawn from ahead
      const dist = 30 + Math.random() * 15;
      const angleX = (Math.random() - 0.5) * 1.2;
      const angleY = (Math.random() - 0.5) * 1.2;
      asteroid.position.set(dist, (Math.random() - 0.5) * 8, (Math.random() - 0.5) * 1.5);
      asteroid.position.applyAxisAngle(new THREE.Vector3(0, 1, 0), angleX);
      asteroid.position.applyAxisAngle(new THREE.Vector3(0, 0, 1), angleY);

      asteroid.userData.vel = new THREE.Vector3(
        -(5 + Math.random() * 4),
        (Math.random() - 0.5) * 2,
        (Math.random() - 0.5) * 2
      );
      asteroid.userData.rotSpeed = new THREE.Vector3(
        (Math.random() - 0.5) * 4,
        (Math.random() - 0.5) * 4,
        (Math.random() - 0.5) * 4
      );
      asteroid.userData.size = size;

      scene.add(asteroid);
      state.asteroids.push(asteroid);
    }

    // --- Explosion Particles ---
    function createExplosion(pos, color, count = 30) {
      const c = new THREE.Color(color);
      for (let i = 0; i < count; i++) {
        const size = 0.03 + Math.random() * 0.12;
        const p = new THREE.Mesh(
          new THREE.SphereGeometry(size, 4, 4),
          new THREE.MeshBasicMaterial({
            color: new THREE.Color().setHSL(Math.random(), 1, 0.5 + Math.random() * 0.4),
            transparent: true,
            opacity: 1
          })
        );
        p.position.copy(pos);
        p.userData.vel = new THREE.Vector3(
          (Math.random() - 0.5) * 10,
          (Math.random() - 0.5) * 10,
          (Math.random() - 0.5) * 10
        );
        p.userData.life = 0.5 + Math.random() * 0.6;
        scene.add(p);
        state.particles.push(p);
      }
    }

    // --- Collisions ---
    function checkBulletCollisions() {
      for (let i = state.bullets.length - 1; i >= 0; i--) {
        const b = state.bullets[i];
        let hit = false;

        for (let j = state.asteroids.length - 1; j >= 0; j--) {
          const a = state.asteroids[j];
          const dist = b.position.distanceTo(a.position);
          if (dist < 0.8 + a.userData.size) {
            createExplosion(a.position.clone(), a.material.color, 35);
            scene.remove(a);
            state.asteroids.splice(j, 1);
            hit = true;
            state.score += 10;
            scoreEl.textContent = `Score: ${state.score}`;
            break;
          }
        }

        if (hit) {
          scene.remove(b);
          state.bullets.splice(i, 1);
        }
      }
    }

    function checkPlayerCollision() {
      const shipPos = new THREE.Vector3();
      ship.getWorldPosition(shipPos);

      for (let i = state.asteroids.length - 1; i >= 0; i--) {
        const a = state.asteroids[i];
        const dist = shipPos.distanceTo(a.position);
        if (dist < 0.6 + a.userData.size) {
          createExplosion(a.position.clone(), a.material.color, 40);
          createExplosion(shipPos.clone(), 0x33aaff, 20);
          scene.remove(a);
          state.asteroids.splice(i, 1);

          state.lives--;
          livesEl.textContent = `Lives: ${state.lives}`;

          // Flash ship
          ship.visible = false;
          setTimeout(() => { ship.visible = true; }, 800);

          if (state.lives <= 0) {
            state.gameOver = true;
            finalScoreEl.textContent = `Score: ${state.score}`;
            gameOverEl.style.display = 'flex';
          }
          return;
        }
      }
    }

    // --- Restart ---
    function restartGame() {
      state.score = 0;
      state.lives = 3;
      state.gameOver = false;
      state.asteroidInterval = 1.0;
      state.asteroidTimer = 0;
      scoreEl.textContent = 'Score: 0';
      livesEl.textContent = 'Lives: 3';
      gameOverEl.style.display = 'none';
      ship.visible = true;

      for (const b of state.bullets) scene.remove(b);
      state.bullets.length = 0;
      for (const a of state.asteroids) scene.remove(a);
      state.asteroids.length = 0;
      for (const p of state.particles) scene.remove(p);
      state.particles.length = 0;

      ship.position.set(0, 0, 0);
    }

    // --- Game Loop ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);
      const time = clock.elapsedTime;

      // --- Update ---
      if (!state.gameOver) {
        // Player movement
        let mx = 0, my = 0;
        if (state.keys.a || state.keys.ArrowLeft) mx = -1;
        if (state.keys.d || state.keys.ArrowRight) mx = 1;
        if (state.keys.w || state.keys.ArrowUp) my = 1;
        if (state.keys.s || state.keys.ArrowDown) my = -1;

        if (mx !== 0 || my !== 0) {
          const len = Math.sqrt(mx*mx + my*my);
          ship.position.x += (mx / len) * state.speed * dt;
          ship.position.y += (my / len) * state.speed * dt;
        }

        ship.position.x = Math.max(-state.bounds.x, Math.min(state.bounds.x, ship.position.x));
        ship.position.y = Math.max(-state.bounds.y, Math.min(state.bounds.y, ship.position.y));

        // Ship tilt
        const targetRoll = -mx * 0.3;
        const targetPitch = -my * 0.2;
        ship.rotation.z += (targetRoll - ship.rotation.z) * 5 * dt;
        ship.rotation.x += (targetPitch - ship.rotation.x) * 5 * dt;

        // Fire cooldown
        if (state.fireCooldown > 0) state.fireCooldown -= dt;

        // Asteroid spawning
        state.asteroidTimer -= dt;
        if (state.asteroidTimer <= 0) {
          spawnAsteroid();
          state.asteroidTimer = state.asteroidInterval;
          state.asteroidInterval = Math.max(0.2, state.asteroidInterval - 0.003);
        }

        // Move bullets
        for (let i = state.bullets.length - 1; i >= 0; i--) {
          const b = state.bullets[i];
          b.position.add(b.userData.vel.clone().multiplyScalar(dt));

          // Bullet trail glow pulse
          b.children[0].scale.setScalar(1 + Math.sin(time * 20 + i) * 0.2);

          if (b.position.x > 40) {
            scene.remove(b);
            state.bullets.splice(i, 1);
          }
        }

        // Move asteroids
        for (const a of state.asteroids) {
          a.position.add(a.userData.vel.clone().multiplyScalar(dt));
          a.rotation.x += a.userData.rotSpeed.x * dt;
          a.rotation.y += a.userData.rotSpeed.y * dt;
          a.rotation.z += a.userData.rotSpeed.z * dt;
        }

        // Remove out-of-bounds asteroids
        for (let i = state.asteroids.length - 1; i >= 0; i--) {
          const a = state.asteroids[i];
          if (a.position.x < -20 || Math.abs(a.position.y) > 20 || Math.abs(a.position.z) > 20) {
            scene.remove(a);
            state.asteroids.splice(i, 1);
          }
        }

        checkBulletCollisions();
        checkPlayerCollision();
      }

      // Particles
      for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.position.add(p.userData.vel.clone().multiplyScalar(dt));
        p.userData.vel.multiplyScalar(0.96);
        p.userData.life -= dt;
        p.material.opacity = Math.max(0, p.userData.life * 1.5);
        if (p.userData.life <= 0) {
          scene.remove(p);
          state.particles.splice(i, 1);
        }
      }

      // Animate background
      nebula.rotation.y += dt * 0.008;
      stars.rotation.y += dt * 0.005;

      // Engine glow pulse
      engine.material.opacity = 0.5 + Math.sin(time * 8) * 0.3;
      trailL.material.opacity = 0.3 + Math.sin(time * 10 + 1) * 0.2;
      trailR.material.opacity = 0.3 + Math.sin(time * 10 + 2) * 0.2;

      // Dynamic colored lights follow ship
      colorLight1.position.x = ship.position.x - 8;
      colorLight1.position.y = ship.position.y + 5;
      colorLight2.position.x = ship.position.x + 8;
      colorLight2.position.y = ship.position.y - 5;

      // Camera follows ship
      camera.position.x = ship.position.x * 0.25;
      camera.position.z = ship.position.z * 0.3 + 14;
      camera.lookAt(ship.position.x * 0.4, 0, 0);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
