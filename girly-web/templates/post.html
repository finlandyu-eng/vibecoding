<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} - Blossom & Bloom</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff0f5, #ffe4f0, #ffd6e8);
            color: #5a2d4e;
            min-height: 100vh;
        }

        nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(219, 112, 147, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Pacifico', cursive;
            font-size: 1.8rem;
            color: #e75480;
            text-decoration: none;
        }

        .nav-links { display: flex; gap: 2rem; list-style: none; }

        .nav-links a {
            text-decoration: none;
            color: #8e4585;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.4rem 0;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #e75480;
            border-bottom-color: #e75480;
        }

        .back-link {
            display: inline-block;
            margin: 3rem auto 0;
            max-width: 700px;
            padding: 0 2rem;
            text-decoration: none;
            color: #e75480;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .back-link::before { content: "\2190 "; }

        .article {
            max-width: 700px;
            margin: 1.5rem auto 3rem;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(219, 112, 147, 0.12);
            border: 1px solid rgba(231, 84, 128, 0.1);
        }

        .article-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(231, 84, 128, 0.1);
        }

        .article-header .icon { font-size: 3rem; margin-bottom: 0.8rem; }

        .article-header h1 {
            font-family: 'Pacifico', cursive;
            font-size: 2.2rem;
            color: #e75480;
            margin-bottom: 0.8rem;
        }

        .article-meta {
            display: flex;
            justify-content: center;
            gap: 1rem;
            align-items: center;
        }

        .article-category {
            background: rgba(231, 84, 128, 0.1);
            color: #e75480;
            padding: 0.25rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .article-date {
            color: #b88a9e;
            font-size: 0.85rem;
        }

        .article-body {
            color: #5a2d4e;
            line-height: 1.9;
            font-size: 1.05rem;
        }

        .article-body p {
            margin-bottom: 1.2rem;
        }

        .article-body strong {
            color: #e75480;
        }

        .divider {
            text-align: center;
            padding: 1.5rem 0;
            font-size: 1.2rem;
            letter-spacing: 0.5rem;
            color: #e75480;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #8e4585;
            font-size: 0.85rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">Blossom & Bloom</a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/blog" class="active">Blog</a></li>
            <li><a href="/gallery">Gallery</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </nav>

    <a href="/blog" class="back-link">Back to all posts</a>

    <article class="article">
        <div class="article-header">
            <div class="icon">{{ post.icon }}</div>
            <h1>{{ post.title }}</h1>
            <div class="article-meta">
                <span class="article-category">{{ post.category }}</span>
                <span class="article-date">{{ post.date }}</span>
            </div>
        </div>
        <div class="article-body">
            {{ post.content | safe }}
        </div>
    </article>

    <div class="divider">&#10024; &#10024; &#10024;</div>

    <footer>
        Made with &#128150; by Blossom & Bloom &middot; 2026
    </footer>
</body>
</html>
