<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Index — Explore</title>
    <style>
      :root{
        --bg1:#0b0812; --bg2:#0f1220; --card:#0f1724;
        --accent:#ff6fbf; --accent-2:#ffd1ec; --cyan:#89d7ff; --muted:#dfe8f4
      }
      *{box-sizing:border-box}
      html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 100%);color:var(--muted);-webkit-font-smoothing:antialiased}
      .container{max-width:1100px;margin:48px auto;padding:28px}
      header{display:flex;align-items:flex-start;gap:20px}
      .logo{width:84px;height:84px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--cyan));display:flex;align-items:center;justify-content:center;font-weight:800;color:#111;box-shadow:0 8px 30px rgba(3,6,18,0.6)}
      h1{margin:0;font-size:2.2rem;color:var(--accent-2)}
      .subtitle{margin-top:8px;color:rgba(255,240,250,0.85)}

      .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:28px}
      .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:18px;padding:18px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.04);box-shadow:0 10px 30px rgba(3,6,18,0.6)}
      .card h3{margin:0 0 6px}
      .card p{margin:0;color:rgba(255,240,250,0.8)}

      .actions{margin-top:14px;display:flex;gap:12px}
      .btn{padding:10px 14px;border-radius:999px;border:none;cursor:pointer;font-weight:700}
      .btn--accent{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#111}
      .btn--ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted)}

      .preview{margin-top:14px;border-radius:12px;overflow:hidden;height:220px;border:1px solid rgba(255,255,255,0.03)}
      .preview iframe{width:100%;height:100%;border:0}

      /* animated border */
      .card::after{content:"";position:absolute;inset:auto 0 0 0;height:6px;background:linear-gradient(90deg,var(--accent),var(--cyan));transform-origin:left;opacity:0.7}

      /* floating blobs */
      .blob{position:fixed;border-radius:50%;filter:blur(48px);opacity:.9;pointer-events:none;z-index:0}
      .blob.a{width:420px;height:420px;right:-120px;top:-120px;background:radial-gradient(circle at 30% 30%, rgba(255,111,191,0.18), transparent 18%)}
      .blob.b{width:320px;height:320px;left:-120px;bottom:-160px;background:radial-gradient(circle at 20% 20%, rgba(137,215,255,0.12), transparent 18%)}

      /* modal preview */
      .modal{position:fixed;inset:0;background:rgba(4,6,12,0.6);display:flex;align-items:center;justify-content:center;padding:24px;z-index:40;visibility:hidden;opacity:0;transition:opacity .18s ease,visibility .18s}
      .modal.is-open{visibility:visible;opacity:1}
      .modal .frame{width:min(1100px,96%);height:min(820px,92%);background:#071019;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.04)}
      .modal .frame iframe{width:100%;height:100%;border:0}
      .close{position:absolute;right:18px;top:18px;background:transparent;border:0;color:var(--muted);font-weight:800;padding:8px 12px;border-radius:8px}

      @media(max-width:880px){.grid{grid-template-columns:1fr}.preview{height:180px}}
    </style>
  </head>
  <body>
    <div class="blob a"></div>
    <div class="blob b"></div>

    <main class="container">
      <header>
        <div class="logo">VC</div>
        <div>
          <h1>Workspace Index</h1>
          <div class="subtitle">Explore your projects — preview, open, or jump into `web1` and `web2`.</div>
        </div>
      </header>

      <section class="grid" id="projectGrid" aria-label="projects"></section>

    </main>

    <div class="modal" id="modal">
      <div class="frame">
        <button class="close" id="close">✕</button>
        <iframe id="modalFrame" src="about:blank" title="preview" style="display:none"></iframe>
        <img id="modalImage" src="" alt="preview" style="width:100%;height:100%;object-fit:cover;display:none"/>
      </div>
    </div>

    <script>
      const modal = document.getElementById('modal');
      const modalFrame = document.getElementById('modalFrame');
      const modalImage = document.getElementById('modalImage');
      const projectGrid = document.getElementById('projectGrid');

      const projects = [
        {
          title: 'web1',
          description: 'Personal site with soft styling and animations. Click preview to open an inline view.',
          path: 'web1/index.html',
          openText: 'Open web1',
          tags: ['pastel flowers', 'bokeh lights', 'landscape'],
          imagePrefix: 'https://source.unsplash.com/featured/800x600/?pastel,pink,flowers'
        },
        {
          title: 'web2',
          description: 'Alternative layout and styles. Preview it inline or open in full window.',
          path: 'web2/index.html',
          openText: 'Open web2',
          tags: ['architecture', 'sea', 'city'],
          imagePrefix: 'https://source.unsplash.com/featured/800x600/?pastel,architecture'
        },
        {
          title: 'Pink Chess',
          description: 'Simple canvas chess game with move history and cute pink styling.',
          path: 'Games/chess/index.html',
          tags: ['pink chess', 'flowers'],
          imagePrefix: 'https://source.unsplash.com/featured/800x600/?pink,chess,board'
        },
        {
          title: 'Pokémon Battle',
          description: 'Choose a starter and battle a wild Pokémon in a turn-based mini-game.',
          path: 'Games/pokemon/index.html',
          tags: ['pokemon battle', 'starter', 'cute'],
          imagePrefix: 'https://source.unsplash.com/featured/800x600/?pokemon,game,starter'
        },
        {
          title: 'Starry Night Puzzle',
          description: 'An artistic sliding puzzle using Van Gogh’s Starry Night. Shuffle the tiles and restore the masterpiece.',
          path: 'Games/painting/index.html',
          tags: ['van gogh art', 'starry night', 'puzzle'],
          imagePrefix: 'https://source.unsplash.com/featured/800x600/?van-gogh,art,painting'
        },
        {
          title: '24 Points',
          description: 'A kid-friendly math game: use 4 numbers and arithmetic to reach exactly 24.',
          path: 'Games/24points/index.html',
          tags: ['math', 'puzzle', 'numbers'],
          imagePrefix: 'https://source.unsplash.com/featured/800x600/?math,game,puzzle'
        }
      ];

      function createProjectCard(project) {
        const card = document.createElement('article');
        card.className = 'card';

        const title = document.createElement('h3');
        title.textContent = project.title;
        card.appendChild(title);

        const desc = document.createElement('p');
        desc.textContent = project.description;
        card.appendChild(desc);

        const actions = document.createElement('div');
        actions.className = 'actions';

        const openLink = document.createElement('a');
        openLink.className = 'btn btn--accent';
        openLink.href = project.path;
        openLink.target = '_self';
        openLink.textContent = project.openText || (project.title.startsWith('web') ? `Open ${project.title}` : 'Open game');
        actions.appendChild(openLink);

        const previewBtn = document.createElement('button');
        previewBtn.className = 'btn btn--ghost';
        previewBtn.setAttribute('data-preview', project.path);
        previewBtn.textContent = 'Preview';
        actions.appendChild(previewBtn);

        card.appendChild(actions);

        if (project.tags && project.tags.length) {
          const thumbs = document.createElement('div');
          thumbs.className = 'thumbs';
          thumbs.style.marginTop = '12px';
          thumbs.style.display = 'flex';
          thumbs.style.gap = '10px';
          thumbs.style.flexWrap = 'wrap';

          project.tags.forEach(tag => {
            const thumbBtn = document.createElement('button');
            thumbBtn.className = 'btn btn--ghost';
            thumbBtn.setAttribute('data-image', `${project.imagePrefix},${tag}`);
            thumbBtn.textContent = tag.charAt(0).toUpperCase() + tag.slice(1);
            thumbs.appendChild(thumbBtn);
          });

          card.appendChild(thumbs);
        }

        const preview = document.createElement('div');
        preview.className = 'preview';

        const iframe = document.createElement('iframe');
        iframe.src = project.path;
        iframe.title = `${project.title} preview`;
        preview.appendChild(iframe);
        card.appendChild(preview);

        return card;
      }

      function buildProjectGrid() {
        projectGrid.innerHTML = '';
        projects.forEach(project => projectGrid.appendChild(createProjectCard(project)));
        attachPreviewHandlers();
      }

      function attachPreviewHandlers() {
        document.querySelectorAll('[data-preview]').forEach(btn => {
          btn.addEventListener('click', () => {
            const url = btn.getAttribute('data-preview');
            modalImage.style.display = 'none';
            modalFrame.style.display = 'block';
            modalFrame.src = url;
            modal.classList.add('is-open');
          });
        });

        document.querySelectorAll('[data-image]').forEach(btn => {
          btn.addEventListener('click', () => {
            const img = btn.getAttribute('data-image');
            modalFrame.style.display = 'none';
            modalImage.style.display = 'block';
            modalImage.src = img + '&' + Date.now();
            modal.classList.add('is-open');
          });
        });
      }

      document.getElementById('close').addEventListener('click', () => {
        modal.classList.remove('is-open');
        modalFrame.src = 'about:blank';
        modalImage.src = '';
      });

      modal.addEventListener('click', e => {
        if (e.target === modal) {
          modal.classList.remove('is-open');
          modalFrame.src = 'about:blank';
          modalImage.src = '';
        }
      });

      function float(el, range, dur) {
        let dir = 1;
        setInterval(() => {
          el.style.transform = `translateY(${dir * range}px)`;
          dir *= -1;
        }, dur);
      }

      float(document.querySelector('.blob.a'), 18, 7000);
      float(document.querySelector('.blob.b'), 12, 9000);

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          modal.classList.remove('is-open');
          modalFrame.src = 'about:blank';
        }
      });

      buildProjectGrid();
    </script>
  </body>
</html>
